syntax = "proto3";

package client_api;

// The API exposed by the Orchestrator to the CLI.
service ClientApi {
    // Requests a worker to handle a task.
    rpc RequestWorker (WorkerRequest) returns (WorkerResponse);
}

// The request message (includes the client-generated job_id)
message WorkerRequest {
    bytes job_id = 1;
}

// The response message containing the worker details.
message WorkerResponse {
    string worker_address = 1;
    // string security_token = 2;
}